name: Deploy Laravel backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-waais-prod-weu
  AZURE_WEBAPP_NAME: app-waais-api-prod-weu
  AZURE_CLIENT_ID: 47ab24d1-5d10-477e-b493-c29728910f3d
  AZURE_TENANT_ID: 9d7271ab-ab49-4b9b-a134-6905a15fdb38
  AZURE_SUBSCRIPTION_ID: a66b1770-137e-49cc-a9c2-0ab3186e9752

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, intl, pdo_pgsql, pdo_sqlite, openssl, tokenizer, fileinfo, ctype
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Make startup script executable
        run: chmod +x startup.sh

      - name: Ensure runtime storage directories exist
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/app/public
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          # Drop a marker so zip never collapses these to empty entries.
          for d in storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/app/public storage/logs bootstrap/cache; do
            touch "$d/.gitkeep"
          done
          chmod -R u+rwX storage bootstrap/cache

      - name: Build deployment zip
        run: |
          rm -rf storage/logs/*.log || true
          # Keep directory entries (-D omitted) so framework subdirs are preserved.
          zip -qr ../waais-backend.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'tests/*' \
            -x '*.env' \
            -x '.env*' \
            -x 'database/database.sqlite'

      - name: Azure login (federated OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: waais-backend.zip
          type: zip
          working-directory: ${{ github.workspace }}

      - name: Azure logout
        if: always()
        run: az logout
        working-directory: .
