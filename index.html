<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./mockups/public-site.html" />
    <title>WAAIS Public Site Mockup</title>
    <style>
      :root {
        --bg: #050e20;
        --panel: #0a1833;
        --nav: #256f8f;
        --text: #ffffff;
        --muted: #94a3b8;
        --line: rgba(100, 130, 200, 0.16);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 0%, rgba(37, 111, 143, 0.48), transparent 30rem),
          radial-gradient(circle at 90% 12%, rgba(196, 30, 58, 0.16), transparent 24rem),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(720px, calc(100% - 40px));
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 24, 51, 0.88);
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening the WAAIS public-site mockup...</h1>
      <p>
        If you are not redirected automatically, open
        <a href="./mockups/public-site.html">the public-site mockup</a>.
      </p>
    </main>
    <script>
      window.location.replace("./mockups/public-site.html");
    </script>
  </body>
</html>
