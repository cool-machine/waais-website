<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Wharton Alumni AI Studio">
  <title>Wharton Alumni AI Studio</title>
  <!-- Square stamp outline -->
  <rect x="3" y="3" width="94" height="94" rx="10" ry="10"
        fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2"/>
  <!-- "AI" wordmark, redrawn from the AI Studio billboard mockup -->
  <g fill="#ffffff">
    <!-- A: filled triangle minus inner triangle, plus crossbar -->
    <path d="
      M 16 78
      L 35.5 22
      L 49 22
      L 68.5 78
      L 56.5 78
      L 53.5 68
      L 31.5 68
      L 28 78
      Z
      M 35 58
      L 49.5 58
      L 42.5 36
      Z
    " fill-rule="evenodd"/>
    <!-- I: clean rectangle -->
    <rect x="74" y="22" width="11" height="56"/>
  </g>
</svg>
